services:
  # The PostgreSQL Database (Free Tier)
  - type: pserv
    name: taskmanager-db
    plan: free
    databaseName: tasks_db
    user: taskuser

  # The Unified Full-Stack Web Service (Free Tier)
  - type: web
    name: taskmanager-web
    plan: free
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskmanager-db
          property: connectionString
